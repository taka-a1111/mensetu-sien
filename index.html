<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta name="theme-color" content="#0E1116">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="面接アシスト">
<title>面接アシスト</title>
<style>
  :root{
    --ink:#0E1116; --panel:#161B22; --panel2:#1B222C; --line:#262E39;
    --txt:#E8EDF2; --muted:#76828F; --muted2:#566270;
    --live:#F5A623; --go:#4FD1C5; --warn:#FF8A5B;
    --safe-t:env(safe-area-inset-top); --safe-b:env(safe-area-inset-bottom);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%;overscroll-behavior:none}
  body{background:var(--ink);color:var(--txt);
    font-family:"Hiragino Kaku Gothic ProN","Noto Sans JP",-apple-system,system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;line-height:1.5;
    padding:0 12px calc(var(--safe-b) + 8px);max-width:560px;margin:0 auto;
    min-height:100dvh;display:flex;flex-direction:column;overflow-y:auto}

  .top{position:sticky;top:0;flex:0 0 auto;z-index:5;background:var(--ink);
    display:flex;align-items:center;gap:8px;
    padding:calc(var(--safe-t) + 8px) 0 9px;border-bottom:1px solid var(--line)}
  .dot{width:11px;height:11px;border-radius:50%;background:var(--muted2);flex:0 0 auto}
  .dot.on{background:var(--live);animation:pulse 1.6s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(245,166,35,.45)}70%{box-shadow:0 0 0 9px rgba(245,166,35,0)}100%{box-shadow:0 0 0 0 rgba(245,166,35,0)}}
  .ttl{margin-right:auto;font-size:13px;font-weight:700;letter-spacing:.03em;line-height:1.25}
  .ttl small{display:block;font-size:10.5px;font-weight:500;color:var(--muted)}

  button{font-family:inherit;cursor:pointer;border:1px solid var(--line);border-radius:11px;
    font-size:14px;font-weight:600;color:var(--txt);background:var(--panel2);padding:10px 13px;transition:.12s}
  button:active{transform:scale(.97)}
  .mic.on{background:#3a2c12;border-color:var(--live);color:#FFD89B}
  .clr{background:#2a1a12;border-color:#4a2c1d;color:#FFC2A6;font-size:13px;padding:10px 12px}
  .go{background:#12302d;border-color:var(--go);color:#9af0e7}

  .body{flex:1;min-height:0;display:flex;flex-direction:column;gap:9px;padding-top:9px}

  .chips{flex:0 0 auto;display:flex;flex-wrap:wrap;gap:6px}
  .chip{flex:1 1 auto;white-space:nowrap;font-size:12px;font-weight:600;padding:8px 10px;border-radius:999px;background:var(--panel);
    border:1px solid var(--line);color:var(--muted);text-align:center}
  .chip.active{background:#14302c;border-color:var(--go);color:#9af0e7}

  .hero{flex:1;min-height:0;overflow:hidden;background:linear-gradient(180deg,var(--panel),#13191f);border:1px solid var(--line);
    border-radius:16px;padding:16px;display:flex;flex-direction:column;gap:11px}
  .qbar{font-size:14px;font-weight:700;color:#BFD0DF;background:#0f1620;border:1px solid var(--line);
    border-radius:10px;padding:9px 12px;display:flex;gap:8px}
  .qbar .m{color:var(--live);flex:0 0 auto}
  .lock{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted2);font-weight:700}
  .points{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:10px;font-size:var(--pt,19px)}
  .points li{font-size:inherit;font-weight:600;letter-spacing:-.01em;display:flex;gap:10px;align-items:flex-start}
  .points li::before{content:"";flex:0 0 auto;width:8px;height:8px;border-radius:2px;background:var(--go);margin-top:.45em}
  .caution{margin-top:auto;font-size:13px;color:var(--warn);background:#2a1a12;border:1px solid #4a2c1d;border-radius:11px;padding:10px 12px}
  .caution::before{content:"⚠ "}
  .ph{color:var(--muted2);font-size:14.5px;flex:1;display:flex;align-items:center;justify-content:center;text-align:center;line-height:1.8}
  .spin{display:inline-block;width:15px;height:15px;border:2px solid var(--line);border-top-color:var(--go);border-radius:50%;animation:rot .7s linear infinite;margin-right:7px;vertical-align:-2px}
  @keyframes rot{to{transform:rotate(360deg)}}

  .scribe{flex:0 0 auto;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:8px 12px}
  .scribe h4{margin:0 0 3px;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted2);font-weight:700;display:flex;justify-content:space-between;align-items:center}
  .scribe h4 button{padding:4px 9px;font-size:11px;border-radius:8px}
  .feed{font-size:13px;color:var(--muted);max-height:46px;overflow-y:auto;line-height:1.55;word-break:break-word}
  .feed .it{color:var(--live);opacity:.85}

  .answerbtn{flex:0 0 auto;width:100%;padding:13px;font-size:15px}
  .row{flex:0 0 auto;display:flex;gap:8px}
  .row input{flex:1;background:var(--panel);border:1px solid var(--line);border-radius:11px;color:var(--txt);padding:11px 12px;font-size:14px;font-family:inherit}
  .row input:focus{outline:none;border-color:var(--go)}

  .sheet{position:fixed;inset:0;background:rgba(8,10,13,.7);display:none;align-items:flex-end;z-index:9}
  .sheet.open{display:flex}
  .card{background:var(--panel);border-top:1px solid var(--line);border-radius:18px 18px 0 0;width:100%;max-width:560px;margin:0 auto;padding:18px 16px calc(var(--safe-b) + 18px);display:flex;flex-direction:column;gap:12px;max-height:88vh;overflow-y:auto}
  .card h3{margin:0;font-size:15px}
  .card label{font-size:12px;color:var(--muted);display:block;margin-bottom:5px}
  .card .hint{font-size:11.5px;color:var(--muted2);line-height:1.6}
  .fld{width:100%;background:var(--panel2);border:1px solid var(--line);border-radius:10px;color:var(--txt);padding:11px;font-size:13px;font-family:inherit}
  textarea.fld{min-height:150px;resize:vertical;line-height:1.6}

  .note{flex:0 0 auto;font-size:10.5px;color:var(--muted2);text-align:center;line-height:1.45;max-height:28px;overflow:hidden}
  .err{color:var(--warn)}

  /* 横長（PC等）：左に操作、右に回答パネルの2カラム */
  @media (min-width:720px){
    body{max-width:980px}
    .body{display:grid;column-gap:14px;
      grid-template-columns:minmax(260px,330px) 1fr;
      grid-template-rows:auto auto auto 1fr;
      grid-template-areas:
        "chips  hero"
        "answer hero"
        "scribe hero"
        "rowx   hero"
        "note   hero";}
    .chips{grid-area:chips}
    .answerbtn{grid-area:answer}
    .scribe{grid-area:scribe}
    .row{grid-area:rowx}
    .note{grid-area:note;align-self:start}
    .hero{grid-area:hero;align-self:stretch}
    .chips{display:grid;grid-template-columns:1fr 1fr;gap:7px}
    .chip{padding:11px 10px;font-size:13px}
  }
</style>
</head>
<body>
  <div class="top">
    <div class="dot" id="dot"></div>
    <div class="ttl">面接アシスト<small id="status">待機中 — マイク停止</small></div>
    <button class="mic" id="mic">🎤</button>
    <button class="clr" id="clrTop">クリア</button>
    <button id="set">⚙️</button>
  </div>

  <div class="body">
    <div class="chips" id="chips"></div>

    <div class="hero" id="hero">
      <div class="ph" id="ph">想定質問をタップ → 回答メモが大きく出て、押すまで固定表示。<br>想定外は「いま聞こえた質問に回答」か手入力で。</div>
    </div>

    <button class="go answerbtn" id="answer">▶ いま聞こえた質問に回答する</button>

    <div class="scribe">
      <h4>聞き取り（最新が下） <button class="clr" id="clrFeed">クリア</button></h4>
      <div class="feed" id="feed"><span style="color:var(--muted2)">🎤を押すと相手の発言がここに流れます。</span></div>
    </div>

    <div class="row">
      <input id="mq" placeholder="質問を手入力（直接これに回答）" enterkeyhint="send">
      <button class="go" id="mgo">出す</button>
    </div>

    <div class="note" id="note"></div>
  </div>

  <div class="sheet" id="sheet">
    <div class="card">
      <h3>設定</h3>

      <div>
        <label>① 送信済みメッセージ・前提（AIが矛盾しないよう必ず参照）</label>
        <textarea id="ctx" class="fld"></textarea>
        <div class="hint">応募文・返信・職務経歴書など、相手が既に読んでいる内容を入れる。AIはこれと矛盾しない回答を作り、書かれていない技術詳細は作話しません。</div>
      </div>

      <div>
        <label>② AI生成用 Anthropic APIキー</label>
        <input id="key" type="password" class="fld" placeholder="sk-ant-...（空なら想定質問＋手入力のみ・無料）">
        <div class="hint">キーはこの端末内にのみ保存。生成は1回数円程度の実費。</div>
      </div>

      <div>
        <label>③ 使用モデル（失敗するなら切り替えて試す）</label>
        <select id="model" class="fld">
          <option value="claude-haiku-4-5-20251001">claude-haiku-4-5（速い・安い）</option>
          <option value="claude-sonnet-4-6">claude-sonnet-4-6（高精度）</option>
          <option value="claude-3-5-haiku-latest">claude-3-5-haiku-latest（予備）</option>
          <option value="claude-3-5-sonnet-latest">claude-3-5-sonnet-latest（予備）</option>
        </select>
        <div class="hint">「モデル名エラー」が出る場合は別の項目に変えて保存し直してください。</div>
      </div>

      <div class="hint">※自動生成はしません。回答はボタンを押した時だけ更新され、次に押すまで固定表示されます。</div>
      <button class="go" id="save">保存して閉じる</button>
    </div>
  </div>

<script>
(function(){
  // ===== 送信済みメッセージの初期値（応募文6/11＋返信6/12）=====
  const DEFAULT_CTX=`【応募時に既に送信済み＝クライアントが把握している。回答はこれと矛盾させない】
■応募メッセージ(2026/06/11)で伝えた内容
・LLM APIや業務自動化ツールを活用したワークフロー構築の経験をアピール
・スキル：GASによる業務自動化／Make・n8n・Zapierを活用したワークフロー自動化の設計・実装／OpenAI・Anthropic・Gemini等のLLM APIを用いたシステム開発／RAG・AIエージェントの設計・実装経験／ヒアリング〜要件定義〜納品まで一気通貫／ビジネス課題から技術選定を逆算した提案／複数社の業務委託を並走
・経歴：フリーランスのライター・SEOコンサルとして独立／オウンドメディアのディレクターを3年(月20〜30記事規模)／複数Webメディアへの納品実績／自社アフィリエイトメディア運営中
・ポートフォリオ：https://portfolio-seven-pink-94.vercel.app/
・稼働：週25〜40時間、月〜金9:00〜18:00、納期厳守
■面接案内への返信(2026/06/12)：一次面接を承諾済み
【整合ルール】上記と食い違う回答を出さない。特にMake/n8n/Zapierは「活用した設計・実装」と既に記載済みなので「使っていない」とは言わない。ただし使用ノード名・社名・具体数値など書いていない詳細は作話せず、深掘りされたら実際に強いGAS/Pythonの実装に話を寄せる。`;

  const PROFILE=`あなたは「インフォサクセスの高崎」の面接即答コーチ。本人が一瞬で見て自分の言葉で話せる短い"回答メモ"を作る。
【実像】名古屋・47歳・フリーランス(屋号インフォサクセス)。前職は三菱自/TTDCで自動車ECU制御エンジニア。軸=SEOコンサル5年/ライティング15年/WordPress12年+/GAS・Python・API開発。
業務自動化実績=①SEO記事生成バッチをVPS(ConoHa/Ubuntu)運用,Claude Code CLI×GAS連携。②CrowdWorks/Lancersの求人を自動収集→報酬抽出→仕分けするGAS×Pythonツール。③Google TasksカンバンのChrome拡張(OAuth2)。
LLM/API=Claude・Gemini・ChatGPTを用途で使い分け。GSC・PageSpeed・Moz・SerpApi・Yahoo形態素解析等を統合。自動化の実装上の主軸はGAS/Python。
SEO実績=あるオウンドメディアで月3万→20万PV,18ヶ月120記事,主要KW1位率15%。本件はレベニューシェア=供給次第で報酬変動、それを理解し他案件と並走できる。
【出力】入力は面接で今聞かれた1つの質問(音声認識の誤字あり)。その質問だけへの回答メモを必ず次のJSONのみで返す(説明やコードフェンス禁止): {"question":"聞かれた質問を整えた短文","points":["要点(各30字以内・話し言葉)",...3〜5個],"caution":"言い過ぎ注意や逆質問(無ければ空)"}`;

  const PRESETS=[
    {t:"自己紹介",q:"自己紹介・これまでの経歴を教えてください",p:["名古屋拠点・フリーランス（屋号インフォサクセス）","前職は自動車ECUの制御エンジニア","独立後はSEO/ライティング＋GAS・API開発が軸","直近はLLMを組んだ業務自動化ツールを自作運用"],c:""},
    {t:"RAG・エージェント",q:"RAG・AIエージェントの実装経験は？",p:["SEO記事生成バッチをVPSで運用（Claude Code CLI×GAS）","求人を自動収集→条件抽出→仕分けするGAS×Pythonツール","Claude/Gemini/ChatGPTを用途で使い分け","GSC/SerpApi等のAPIをツールに統合","要件定義〜納品まで自走できます"],c:"例は1つに絞り、工数・時間の数字で語る"},
    {t:"Make/n8n",q:"Make/n8n/Zapierの実務経験は？",p:["ワークフロー自動化はGAS/Pythonが実装の主軸です","Make/n8n/Zapierもフロー設計で使い分けています","API連携・分岐・定期実行を組む形が中心","要件に応じてノーコードとコードを選びます"],c:"応募文と整合（使っている前提）。具体ノード名は作話せず、深掘りはGAS/Pythonの実装に寄せる"},
    {t:"報酬形態",q:"レベニューシェアでも問題ないですか？",p:["供給次第で報酬が変動する構造は理解しています","他案件と並走しながら中長期で取り組めます","裁量を持って自走できるのが強みです"],c:"逆質問：直近の案件獲得ペース／支払い条件を確認"},
    {t:"苦労した実装",q:"一番苦労した実装と乗り越え方は？",p:["VPS×Claude Code CLI×GAS連携バッチの安定運用","APIのレート制限・エラー処理でつまづいた","ログ設計＋リトライ機構で自動復旧する形に"],c:""},
    {t:"非エンジニア説明",q:"非エンジニアへの技術説明は？",p:["『何が・どれだけ楽になるか』を時間とコストに翻訳","専門用語を避けビフォーアフターで見せる","15年のライティングで“伝える”のは得意"],c:""},
    {t:"コスト/対策",q:"LLMのコスト管理・ハルシ対策は？",p:["軽い処理は安価モデル、用途で使い分け","出力に検証ステップ・ルールチェックを挟む","重要箇所はソース参照・人の確認を残す"],c:""},
    {t:"稼働条件",q:"稼働可能時間・他案件との並行は？",p:["平日9〜18時、週25〜40時間で対応可能","複数案件の並走経験あり","レスポンスは早めを心がけています"],c:""},
  ];

  const $=id=>document.getElementById(id);
  const hero=$("hero"),ph=$("ph"),feed=$("feed"),dot=$("dot"),status=$("status"),micBtn=$("mic"),note=$("note");
  const esc=s=>(s||"").replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));

  let KEY=localStorage.getItem("ia_key")||"";
  let MODEL=localStorage.getItem("ia_model")||"claude-haiku-4-5-20251001";
  let CTX=localStorage.getItem("ia_context"); if(CTX===null)CTX=DEFAULT_CTX;
  $("key").value=KEY; $("ctx").value=CTX; $("model").value=MODEL;

  const chipsEl=$("chips");
  PRESETS.forEach(p=>{const b=document.createElement("button");b.className="chip";b.textContent=p.t;
    b.onclick=()=>{setActive(b);render({question:p.q,points:p.p,caution:p.c},"想定質問");};chipsEl.appendChild(b);});
  function setActive(el){[...chipsEl.children].forEach(c=>c.classList.remove("active"));if(el)el.classList.add("active");}

  let lastAnswer=null;
  function render(a,tag){ph.style.display="none";lastAnswer={a,tag};
    let h=`<div class="qbar"><span class="m">Q.</span><span>${esc(a.question||"")}</span></div>`;
    h+=`<ul class="points">`+a.points.map(p=>`<li>${esc(p)}</li>`).join("")+`</ul>`;
    if(a.caution)h+=`<div class="caution">${esc(a.caution)}</div>`;
    h+=`<div class="lock">${tag||"回答"}・固定表示中（次に押すまで変わりません）</div>`;
    hero.innerHTML=h;requestAnimationFrame(fitHero);}
  function fitHero(){
    const ul=hero.querySelector(".points");if(!ul)return;
    let s=21;ul.style.fontSize=s+"px";let g=0;
    while(hero.scrollHeight>hero.clientHeight && s>12 && g<60){s--;ul.style.fontSize=s+"px";g++;}
  }
  function loading(){ph.style.display="none";lastAnswer=null;hero.innerHTML=`<div class="ph"><span class="spin"></span>この質問の回答を生成中…</div>`;}
  function showErr(m){ph.style.display="none";lastAnswer=null;hero.innerHTML=`<div class="ph err" style="white-space:pre-line">${esc(m)}</div>`;}
  window.addEventListener("resize",()=>{if(lastAnswer)fitHero();});

  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  const isiOS=/iP(hone|ad|od)/.test(navigator.userAgent);
  let rec=null,listening=false,finalText="",cutIdx=0;

  if(!SR){micBtn.disabled=true;note.innerHTML="このブラウザは音声認識に未対応。<b>Android Chrome推奨</b>。想定質問ボタンと手入力をご利用ください。";}
  else if(isiOS){note.innerHTML="iPhoneは音声認識が不安定。<b>想定質問ボタン＋手入力</b>を主にお使いください（🎤は補助）。";}
  else{note.innerHTML="質問→ボタン or ▶。回答は固定表示。クリアで次の質問へ。";}

  function startRec(){rec=new SR();rec.lang="ja-JP";rec.continuous=true;rec.interimResults=true;
    rec.onresult=e=>{let it="";for(let i=e.resultIndex;i<e.results.length;i++){const r=e.results[i];
      if(r.isFinal)finalText=(finalText+" "+r[0].transcript).slice(-3000);else it+=r[0].transcript;}
      feed.innerHTML=esc(finalText.slice(-500))+(it?` <span class="it">${esc(it)}</span>`:"");feed.scrollTop=feed.scrollHeight;};
    rec.onerror=ev=>{if(ev.error==="not-allowed"){status.textContent="マイク権限が必要です";stop();}};
    rec.onend=()=>{if(listening){try{rec.start();}catch(_){}}};try{rec.start();}catch(_){}}
  function stop(){listening=false;if(rec){try{rec.stop();}catch(_){}}rec=null;
    dot.classList.remove("on");micBtn.classList.remove("on");status.textContent="待機中 — マイク停止";}
  micBtn.onclick=()=>{if(listening){stop();return;}listening=true;startRec();
    dot.classList.add("on");micBtn.classList.add("on");status.textContent="聞き取り中…";};

  function clearFeed(){finalText="";cutIdx=0;feed.innerHTML='<span style="color:var(--muted2)">クリアしました。次の質問を待ちます。</span>';}
  $("clrTop").onclick=clearFeed; $("clrFeed").onclick=clearFeed;

  let busy=false;
  async function gen(question,tag){
    if(!KEY){showErr("AI生成には⚙️でAPIキー設定が必要です。想定質問ボタンか手入力をどうぞ。");return;}
    if(busy)return;busy=true;loading();setActive(null);
    const sys=PROFILE+"\n\n"+CTX+"\n\n【厳守】送信済み内容と矛盾しない。書かれていない技術詳細(ノード名・社名・数値)は作話しない。事実にない実績は作らない。";
    try{
      const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",
        headers:{"Content-Type":"application/json","x-api-key":KEY,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
        body:JSON.stringify({model:MODEL,max_tokens:700,system:sys,
          messages:[{role:"user",content:"面接で今この質問を聞かれた。これだけへの回答メモをJSONで返す（過去の会話文脈は無視）:\n「"+question+"」"}]})});
      const d=await res.json();
      if(!res.ok||d.type==="error"){
        const em=(d.error&&d.error.message)||("HTTP "+res.status);
        let hint="";
        if(res.status===401) hint="→ APIキーが無効。⚙️でキーを貼り直してください。";
        else if(res.status===400 && /model/i.test(em)) hint="→ モデル名エラー。⚙️のモデル欄を変更してください。";
        else if(res.status===400 && /credit|balance/i.test(em)) hint="→ 残高不足。Anthropicでクレジットを購入してください。";
        else if(res.status===429) hint="→ レート制限。少し待って再実行を。";
        showErr("API エラー（"+res.status+"）: "+em+(hint?"\n"+hint:""));return;
      }
      const raw=(d.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("\n");
      const j=JSON.parse(raw.replace(/```json|```/g,"").trim());
      if(!j.points||!j.points.length)throw new Error("回答の形式が想定外。もう一度押してください。");
      render(j,tag||"AI回答");
    }catch(e){showErr("通信に失敗: "+(e&&e.message?e.message:e)+"\n（キー誤り／ネット不通／モデル名のいずれか。⚙️を確認）");}
    finally{busy=false;}
  }

  $("answer").onclick=()=>{
    let seg=finalText.slice(cutIdx).trim();
    if(!seg)seg=finalText.slice(-220).trim();
    if(!seg){showErr("まだ質問を聞き取れていません。相手が話してから押してください。");return;}
    cutIdx=finalText.length;
    gen(seg,"AI回答（最新の質問）");
  };

  $("mgo").onclick=()=>{const v=$("mq").value.trim();if(v)gen(v,"AI回答（手入力）");};
  $("mq").addEventListener("keydown",e=>{if(e.key==="Enter"){const v=e.target.value.trim();if(v)gen(v,"AI回答（手入力）");}});

  $("set").onclick=()=>$("sheet").classList.add("open");
  $("sheet").onclick=e=>{if(e.target===$("sheet"))$("sheet").classList.remove("open");};
  $("save").onclick=()=>{KEY=$("key").value.trim();CTX=$("ctx").value;MODEL=$("model").value;
    localStorage.setItem("ia_key",KEY);localStorage.setItem("ia_context",CTX);localStorage.setItem("ia_model",MODEL);$("sheet").classList.remove("open");};

  try{
    const c=document.createElement("canvas");c.width=c.height=192;const x=c.getContext("2d");
    x.fillStyle="#0E1116";x.fillRect(0,0,192,192);x.fillStyle="#4FD1C5";
    x.font="bold 110px sans-serif";x.textAlign="center";x.textBaseline="middle";x.fillText("面",96,104);
    const icon=c.toDataURL("image/png");
    const ap=document.createElement("link");ap.rel="apple-touch-icon";ap.href=icon;document.head.appendChild(ap);
    const mani={name:"面接アシスト",short_name:"面接",display:"standalone",orientation:"portrait",
      background_color:"#0E1116",theme_color:"#0E1116",start_url:".",icons:[{src:icon,sizes:"192x192",type:"image/png"}]};
    const link=document.createElement("link");link.rel="manifest";
    link.href=URL.createObjectURL(new Blob([JSON.stringify(mani)],{type:"application/manifest+json"}));
    document.head.appendChild(link);
  }catch(_){}
})();
</script>
</body>
</html>
